dataset:
  name: stage2_smoke_v0
  image_size: 256
  heatmap_size: 64
  frames_per_sequence: 20
  world_size_m: 4000.0

splits:
  train:
    sequences: 8
  val:
    sequences: 8
  test:
    sequences: 8

stages:
  far:
    gsd_m_per_px: 20.0
    perception_dt: 1.0
    observation_source: external_cue
    center_jitter_px: 40.0
    target_scale_range: [0.05, 0.10]
  mid:
    gsd_m_per_px: 10.0
    perception_dt: 1.0
    observation_source: onboard_midrange
    center_jitter_px: 35.0
    target_scale_range: [0.07, 0.14]
  terminal:
    gsd_m_per_px: 5.0
    perception_dt: 0.5
    observation_source: onboard_terminal
    center_jitter_px: 30.0
    target_scale_range: [0.10, 0.20]

motion_modes:
  cv: 0.35
  turn: 0.25
  piecewise: 0.25
  evasive: 0.15

distractors:
  min_count: 0
  max_count: 2
  scale_range: [0.04, 0.12]

visibility:
  min_positive_visibility: 0.35
  max_low_visibility_ratio: 0.10

perturbations:
  brightness_jitter: 0.2
  contrast_jitter: 0.2
  blur_prob: 0.25
  haze_prob: 0.20
  light_cloud_prob: 0.15
  compression_prob: 0.15

target:
  scale_mode: physical_gsd
  physical_size_m:
    length_m: 200.0
    width_m: 40.0
  fixed_scale_range: [0.08, 0.12]
  max_step_px: 8.0
  allowed_categories: ["boat_top"]
  heading_noise_deg: 4.0

continuity:
  max_position_shift_ratio: 0.15
  max_scale_change_ratio: 0.05
  max_angle_change_deg: 12.0
  max_crop_shift_ratio: 0.15

placement:
  require_water_mask: true
  max_land_overlap: 0.0
  max_shore_buffer_overlap: 0.05
  min_visibility: 0.35
  max_truncation_ratio: 0.20
  min_shore_clearance_px: 5

seed:
  global_seed: 20260427

assets:
  root: D:/Projects/brain_uav_paper2/data/assets/source_stage2
  inventory_csv: data/assets/stage2/asset_inventory.csv

