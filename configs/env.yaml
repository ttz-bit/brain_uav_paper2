project:
  name: "brain_uav_paper2"
  stage: "phase1a_dynamic_env"

world:
  unit_name: "abstract_world_unit"
  dt: null
  x_range: null
  y_range: null

aircraft:
  state_dim: 4
  speed: null
  heading_dim: 1

target:
  state_dim: 4
  default_mode: "cv"
  motion_modes:
    - "cv"
    - "turn"
    - "piecewise"
    - "evasive"

no_fly_zone:
  max_count: null
  radius_min: null
  radius_max: null

observation:
  use_target_truth: true
  use_vision_observation: true
  use_target_estimate: true

phase3_paper1:
  world:
    unit_name: "m"
    paper2_render_world_size_m: 4000.0
    paper1_origin: "centered_xy_ground_z0"
    paper2_origin: "render_bottom_left_xy"
    xy_transform: "paper2_xy = paper1_xy + [world_size_m / 2, world_size_m / 2]"
  aircraft:
    state_order: ["x", "y", "z", "gamma", "psi"]
    action_type: "delta_gamma_delta_psi"
    speed: 2.5
    gamma_max: 0.6
    delta_gamma_max: 0.14
    delta_psi_max: 0.2
  target:
    goal_policy: "static_goal_until_vision_estimate_is_connected"
    vision_estimate_z_policy: "keep_current_goal_z"
  no_fly_zone:
    geometry: "hemisphere"
    center_z: 0.0
    safety_margin_source: "paper1.warning_distance"

phase3_target_motion:
  seed: 20260429
  dt: 1.0
  frames_per_sequence: 40
  default_sequences: 64
  area:
    x_min: 0.0
    x_max: 4000.0
    y_min: 0.0
    y_max: 4000.0
  init_margin: 450.0
  boundary_margin: 120.0
  mode_probs:
    cv: 0.35
    turn: 0.25
    piecewise: 0.25
    evasive: 0.15
  speed_range:
    min: 6.0
    max: 18.0
  turn_rate_range:
    min: -0.08
    max: 0.08
  switch_interval_range:
    min: 8
    max: 24
  piecewise_heading_delta_range:
    min: -0.75
    max: 0.75
  evasive:
    trigger_distance: 350.0
    heading_gain: 0.35
    random_jitter_range:
      min: -0.25
      max: 0.25
  continuity:
    max_step_distance_factor: 1.05

phase1a:
  seed: 42
  dt: 1.0
  max_steps: 300
  capture_radius: 5.0
  min_init_dist: 40.0
  max_init_dist: 200.0
  resample_limit: 200
  truth_crop_horizon_sec: 1.0
  area:
    x_min: 0.0
    x_max: 1000.0
    y_min: 0.0
    y_max: 1000.0
  aircraft:
    speed: 12.0
  no_fly_zone:
    count_min: 1
    count_max: 3
    radius_min: 20.0
    radius_max: 60.0
  target_dynamics:
    mode_probs:
      cv: 0.25
      turn: 0.25
      piecewise: 0.25
      evasive: 0.25
    speed_range:
      min: 6.0
      max: 18.0
    turn_rate_range:
      min: -0.08
      max: 0.08
    switch_interval_range:
      min: 8
      max: 24
    evasive_intensity_range:
      min: 0.12
      max: 0.25
